services:
  - type: web
    name: gym-ai-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_API_URL
        value: "https://your-frontend-url.vercel.app" # Update this to your frontend URL if hosting frontend separately
      - key: DB_HOST
        value: "your_db_host"
      - key: DB_USER
        value: "your_db_user"
      - key: DB_PASS
        value: "your_db_pass"
      - key: DB_NAME
        value: "your_db_name"
      - key: JWT_SECRET
        value: "your_jwt_secret"
      - key: GEMINI_API_KEY
        value: "your_gemini_api_key"
      - key: MISTRAL_API_KEY
        value: "your_mistral_api_key"
      - key: RAPIDAPI_KEY
        value: "your_rapidapi_key"
